name: check_presence
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # Firebase (check_presence baseline + Realtime Database + Storage)
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  firebase_database: ^12.3.0
  firebase_storage: ^13.0.5

  cupertino_icons: ^1.0.8

  # ML Kit (smart_badge_flutter_MLKIT)
  google_mlkit_face_detection: ^0.13.2
  google_mlkit_translation: ^0.13.1
  google_mlkit_text_recognition: ^0.15.1
  google_mlkit_barcode_scanning: ^0.14.2
  camera: ^0.12.0+1

  path: ^1.9.0

  provider: ^6.1.1
  shared_preferences: ^2.2.2

  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4

  qr_flutter: ^4.1.0
  audioplayers: ^6.0.0
  vibration: ^3.1.8

  pdf: ^3.11.0
  path_provider: ^2.1.2
  share_plus: 12.0.2

  fl_chart: ^1.2.0

  uuid: ^4.3.3
  permission_handler: ^12.0.1
  intl: ^0.20.2
  package_info_plus: 9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/images/
